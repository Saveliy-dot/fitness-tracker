name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
            --exclude "node_modules" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude "dist" \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PATH }}

      - name: Install dependencies & build on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'

              cd ${{ secrets.REMOTE_PATH }}

              # зависимости
              pnpm install

              # если есть build (опционально)
              # if [ -f "package.json" ] && grep -q "\"build\"" package.json; then
              #   pnpm build
              # fi

          EOF

      - name: Restart systemd service
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'

              sudo systemctl restart fitness-tracker.service
              sudo systemctl status fitness-tracker.service --no-pager

          EOF
